<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bet Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&family=Barlow+Condensed:wght@600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
:root {
  --bg:      #07090F;
  --s1:      #0D1117;
  --s2:      #131923;
  --border:  #1C2535;
  --green:   #00D68F;
  --green2:  #004D33;
  --red:     #FF4D4D;
  --red2:    #4D0000;
  --blue:    #4D9FFF;
  --amber:   #FFB84D;
  --text:    #E8EDF5;
  --muted:   #4A5568;
  --label:   #8892A4;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;font-size:13px;min-height:100vh}

/* Header */
header{background:var(--s1);border-bottom:1px solid var(--border);padding:0 20px;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.logo{font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:800;letter-spacing:2px;color:var(--text)}
.logo span{color:var(--green)}
.tabs{display:flex;gap:6px}
.tab{background:var(--s2);border:1px solid var(--border);color:var(--muted);padding:5px 14px;border-radius:20px;cursor:pointer;font-size:12px;font-weight:600;transition:all .15s;font-family:'Inter',sans-serif}
.tab.on{background:var(--green);border-color:var(--green);color:#000}
.ref{background:none;border:1px solid var(--border);color:var(--muted);padding:5px 10px;border-radius:8px;cursor:pointer;font-size:12px;font-family:'Inter',sans-serif;transition:all .15s}
.ref:hover{color:var(--blue);border-color:var(--blue)}

main{padding:16px 20px;max-width:1440px;margin:0 auto}

/* Loading */
#loading{text-align:center;padding:80px 0;color:var(--muted)}
.spin{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--green);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 14px}
@keyframes spin{to{transform:rotate(360deg)}}

/* Scorecards */
.scores{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin-bottom:14px}
@media(max-width:900px){.scores{grid-template-columns:repeat(2,1fr)}}
.sc{background:var(--s1);border:1px solid var(--border);border-radius:10px;padding:16px 18px;position:relative;overflow:hidden}
.sc::after{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--a,var(--blue))}
.sc-lbl{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:8px}
.sc-val{font-family:'Barlow Condensed',sans-serif;font-size:30px;font-weight:700;line-height:1;color:var(--text)}
.sc-sub{font-size:11px;color:var(--muted);margin-top:5px}
.pos{color:var(--green)!important}
.neg{color:var(--red)!important}
.neu{color:var(--label)!important}

/* Chart grid */
.row2{display:grid;grid-template-columns:3fr 1.1fr;gap:12px;margin-bottom:12px}
.row3{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:12px}
@media(max-width:900px){.row2,.row3{grid-template-columns:1fr}}

/* Cards */
.cc{background:var(--s1);border:1px solid var(--border);border-radius:10px;padding:18px}
.ct{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:14px}
.cw{position:relative}

/* Table */
.tcard{background:var(--s1);border:1px solid var(--border);border-radius:10px;overflow:hidden;margin-bottom:12px}
.thead{padding:14px 18px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.thead .ct{margin:0}
.tscroll{overflow-x:auto}
table{width:100%;border-collapse:collapse}
th{padding:9px 14px;text-align:left;font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);background:var(--s2);border-bottom:1px solid var(--border);white-space:nowrap}
td{padding:10px 14px;border-bottom:1px solid var(--border);font-size:12px;vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--s2)}
.badge{display:inline-block;padding:2px 7px;border-radius:20px;font-size:10px;font-weight:700;text-transform:uppercase}
.bw{background:var(--green2);color:var(--green)}
.bl{background:var(--red2);color:var(--red)}
.bp{background:#1C2535;color:#6B7A90}
.bpend{background:#2A1F00;color:var(--amber)}

/* Footer */
.foot{text-align:center;color:var(--muted);font-size:11px;padding:12px}

/* Filter row */
.filter-row{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;align-items:center}
.filter-lbl{font-size:11px;color:var(--muted)}
.fsel{background:var(--s2);border:1px solid var(--border);color:var(--label);padding:4px 10px;border-radius:6px;font-size:12px;font-family:'Inter',sans-serif;cursor:pointer}
</style>
</head>
<body>
<header>
  <div class="logo">BET<span>TRACKER</span></div>
  <div class="tabs">
    <button class="tab on" onclick="switchUser('Zach',this)">Zach</button>
    <button class="tab" onclick="switchUser('TheBlackWhale',this)">TheBlackWhale</button>
  </div>
  <button class="ref" onclick="loadData()">↻ Refresh</button>
</header>

<main>
<div id="loading"><div class="spin"></div><p>Loading...</p></div>
<div id="dash" style="display:none">

  <div class="scores">
    <div class="sc" style="--a:var(--green)">
      <div class="sc-lbl">Net P&L</div>
      <div class="sc-val" id="s-pnl">—</div>
      <div class="sc-sub" id="s-roi">—</div>
    </div>
    <div class="sc" style="--a:var(--blue)">
      <div class="sc-lbl">Win Rate</div>
      <div class="sc-val" id="s-wr">—</div>
      <div class="sc-sub" id="s-rec">—</div>
    </div>
    <div class="sc" style="--a:var(--blue)">
      <div class="sc-lbl">Total Bets</div>
      <div class="sc-val" id="s-tot">—</div>
      <div class="sc-sub" id="s-stk">—</div>
    </div>
    <div class="sc" style="--a:var(--amber)">
      <div class="sc-lbl">Pending</div>
      <div class="sc-val" id="s-pend">—</div>
      <div class="sc-sub" id="s-up">—</div>
    </div>
    <div class="sc" style="--a:var(--green)">
      <div class="sc-lbl">Streak · L30</div>
      <div class="sc-val" id="s-str">—</div>
      <div class="sc-sub" id="s-l30">—</div>
    </div>
  </div>

  <div class="row2">
    <div class="cc">
      <div class="ct">Equity Curve — Cumulative P&L</div>
      <div class="cw" style="height:230px"><canvas id="c-eq"></canvas></div>
    </div>
    <div class="cc">
      <div class="ct">W / L / P</div>
      <div class="cw" style="height:230px"><canvas id="c-pie"></canvas></div>
    </div>
  </div>

  <div class="row3">
    <div class="cc">
      <div class="ct">Net by Sport</div>
      <div class="cw" style="height:230px"><canvas id="c-sport"></canvas></div>
    </div>
    <div class="cc">
      <div class="ct">Net by Bet Type</div>
      <div class="cw" style="height:230px"><canvas id="c-type"></canvas></div>
    </div>
    <div class="cc">
      <div class="ct">Net by Sportsbook</div>
      <div class="cw" style="height:230px"><canvas id="c-book"></canvas></div>
    </div>
  </div>

  <div class="tcard">
    <div class="thead">
      <span class="ct">Recent Bets</span>
      <span id="t-count" style="color:var(--muted);font-size:11px"></span>
    </div>
    <div class="tscroll">
      <table>
        <thead><tr>
          <th>Date</th><th>Description</th><th>Sport</th>
          <th>Book</th><th>Odds</th><th>Stake</th><th>Status</th><th>Profit</th>
        </tr></thead>
        <tbody id="t-body"></tbody>
      </table>
    </div>
  </div>

  <div class="foot" id="foot"></div>
</div>
</main>

<script>
const SID = '1Ynawm1kVditvEmgaOWUdBbhIgi-dnunKguOAzc6wUEQ';
let user = 'Zach', CH = {};

// Column map
const C = {
  DATE:0,SETTLED:1,USER:2,GRP:3,DESC:4,SPORT:5,LEAGUE:6,
  BOOK:7,TYPE:8,PROP:9,LEGS:10,ODDS:11,STAKE:12,WIN:13,
  STATUS:14,PROFIT:15,ROI:16,CUM:17,STREAK:18,MSGID:19
};

// ── Date parser: handles "2026-06-17 12:30 PM" format ──────────────────
function parseDate(s) {
  if (!s) return null;
  s = s.toString().trim();
  // Try "YYYY-MM-DD HH:MM AM/PM"
  let m = s.match(/^(\d{4}-\d{2}-\d{2})\s+(\d{1,2}):(\d{2})\s*(AM|PM)?/i);
  if (m) {
    let [,date,h,min,ap] = m;
    h = parseInt(h); min = parseInt(min);
    if (ap) {
      if (ap.toUpperCase()==='PM' && h!==12) h+=12;
      if (ap.toUpperCase()==='AM' && h===12) h=0;
    }
    return new Date(`${date}T${String(h).padStart(2,'0')}:${String(min).padStart(2,'0')}:00`);
  }
  const d = new Date(s);
  return isNaN(d) ? null : d;
}

function fmtDate(s) {
  const d = parseDate(s);
  if (!d) return '—';
  return d.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
}

// ── Number formatters ──────────────────────────────────────────────────
function fmtMoney(n, alwaysSign=true) {
  if (n==null||isNaN(n)) return '—';
  const abs = Math.abs(n);
  const str = abs >= 10000 ? '$'+Math.round(abs/1000)+'K'
             : abs >= 1000  ? '$'+(abs/1000).toFixed(1)+'K'
             : '$'+abs.toFixed(2);
  if (alwaysSign) return (n>=0?'+':'-')+str;
  return (n<0?'-':'')+str;
}
function fmtPct(n) { return n==null?'—':n.toFixed(1)+'%'; }
function fmtOdds(n) {
  if (n==null||isNaN(n)) return '—';
  return n>0?'+'+n:String(n);
}

// ── Normalize text keys ────────────────────────────────────────────────
function norm(s) {
  if (!s||s==='null'||s==='undefined') return null;
  s = s.toString().trim();
  if (!s) return null;
  // Title-case
  return s.charAt(0).toUpperCase()+s.slice(1).toLowerCase();
}
function normBook(s) {
  if (!s||s==='null') return null;
  s = s.toString().trim();
  if (!s) return null;
  // Known normalizations
  const map = {novig:'Novig',draftkings:'DraftKings',fanduel:'FanDuel',
    betmgm:'BetMGM',caesars:'Caesars',kalshi:'Kalshi',
    'espn bet':'ESPN BET',prizepicks:'PrizePicks',underdog:'Underdog',
    polymarket:'Polymarket',prophetx:'ProphetX'};
  return map[s.toLowerCase()]||s;
}

// ── User switch ────────────────────────────────────────────────────────
function switchUser(u, el) {
  user = u;
  document.querySelectorAll('.tab').forEach(b=>b.classList.remove('on'));
  el.classList.add('on');
  loadData();
}

// ── Fetch & parse ──────────────────────────────────────────────────────
async function loadData() {
  document.getElementById('loading').style.display='block';
  document.getElementById('dash').style.display='none';
  try {
    const url=`https://docs.google.com/spreadsheets/d/${SID}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(user)}&headers=1`;
    const text = await fetch(url).then(r=>r.text());
    const json = JSON.parse(text.match(/setResponse\(([\s\S]*)\)/)[1]);
    const rows = (json.table.rows||[])
      .map(r=>(r.c||[]).map(c=>c?c.v:null))
      .filter(r=>r[C.STATUS]&&r[C.STATUS]!=='Status'); // skip empty + header row
    render(rows);
    document.getElementById('loading').style.display='none';
    document.getElementById('dash').style.display='block';
    document.getElementById('foot').textContent=
      'Updated '+new Date().toLocaleTimeString()+' · auto-refreshes every 10 min';
  } catch(e) {
    document.getElementById('loading').innerHTML=
      `<div style="color:var(--red);padding:40px;text-align:center">
        <div style="font-size:36px;margin-bottom:10px">⚠️</div>
        <b>Could not load data</b><br>
        <span style="color:var(--muted)">Make sure the Google Sheet is shared<br>"Anyone with the link — Viewer"</span>
       </div>`;
    console.error(e);
  }
}

// ── Group by field, sum profit ─────────────────────────────────────────
function groupProfit(rows, col, normalizer) {
  const map={};
  rows.forEach(r=>{
    const k = normalizer ? normalizer(r[col]) : norm(r[col]);
    if (!k) return;
    map[k]=(map[k]||0)+(r[C.PROFIT]||0);
  });
  return Object.entries(map)
    .filter(([,v])=>v!==0)
    .sort((a,b)=>b[1]-a[1]);
}

// ── Bar chart ──────────────────────────────────────────────────────────
function mkBar(id, labels, vals) {
  if (CH[id]) CH[id].destroy();
  const colors = vals.map(v=>v>=0?'#00D68F':'#FF4D4D');
  CH[id]=new Chart(document.getElementById(id).getContext('2d'),{
    type:'bar',
    data:{labels,datasets:[{data:vals,backgroundColor:colors,borderRadius:4,borderSkipped:false}]},
    options:{
      indexAxis:'y',responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>fmtMoney(c.raw)}}},
      scales:{
        x:{grid:{color:'#1C2535'},ticks:{color:'#4A5568',font:{size:10},callback:v=>fmtMoney(v)}},
        y:{grid:{display:false},ticks:{color:'#8892A4',font:{size:11}}}
      }
    }
  });
}

// ── Main render ────────────────────────────────────────────────────────
function render(rows) {
  const settled = rows.filter(r=>r[C.STATUS]!=='pending');
  const pending = rows.filter(r=>r[C.STATUS]==='pending');
  const won  = settled.filter(r=>r[C.STATUS]==='won');
  const lost = settled.filter(r=>r[C.STATUS]==='lost');
  const push = settled.filter(r=>r[C.STATUS]==='push');

  const netPnL  = settled.reduce((s,r)=>s+(r[C.PROFIT]||0),0);
  const staked  = rows.reduce((s,r)=>s+(r[C.STAKE]||0),0);
  const stkedSt = settled.reduce((s,r)=>s+(r[C.STAKE]||0),0);
  const roi     = stkedSt>0?(netPnL/stkedSt*100):0;
  const wr      = (won.length+lost.length)>0?(won.length/(won.length+lost.length)*100):0;
  const upside  = pending.reduce((s,r)=>s+(r[C.WIN]||0),0);
  const risk    = pending.reduce((s,r)=>s+(r[C.STAKE]||0),0);

  // Last streak from data
  const lastStrRow = [...rows].filter(r=>r[C.STREAK]).pop();
  const streakVal  = lastStrRow?lastStrRow[C.STREAK]:'—';

  // L30
  const now = new Date();
  const cut30 = new Date(now); cut30.setDate(now.getDate()-30);
  const l30 = settled.filter(r=>{const d=parseDate(r[C.DATE]);return d&&d>=cut30;});
  const l30net = l30.reduce((s,r)=>s+(r[C.PROFIT]||0),0);

  // ── Scorecards ──
  const pnlEl=document.getElementById('s-pnl');
  pnlEl.textContent=fmtMoney(netPnL);
  pnlEl.className='sc-val '+(netPnL>=0?'pos':'neg');
  document.getElementById('s-roi').textContent=fmtPct(roi)+' ROI  ·  $'+stkedSt.toFixed(0)+' staked';

  const wrEl=document.getElementById('s-wr');
  wrEl.textContent=fmtPct(wr);
  wrEl.className='sc-val '+(wr>=52?'pos':wr<45?'neg':'neu');
  document.getElementById('s-rec').textContent=`${won.length}W  ${lost.length}L  ${push.length}P`;

  document.getElementById('s-tot').textContent=rows.length;
  document.getElementById('s-stk').textContent='$'+staked.toFixed(0)+' total risked';

  document.getElementById('s-pend').textContent=pending.length||'0';
  document.getElementById('s-up').textContent=pending.length
    ?'risk $'+risk.toFixed(0)+'  ·  upside +$'+upside.toFixed(0)
    :'nothing open';

  const strEl=document.getElementById('s-str');
  strEl.textContent=streakVal;
  strEl.className='sc-val '+(streakVal.startsWith('W')?'pos':streakVal.startsWith('L')?'neg':'neu');
  const l30El=document.getElementById('s-l30');
  l30El.textContent=fmtMoney(l30net)+' last 30 days';
  l30El.className='sc-sub '+(l30net>=0?'pos':'neg');

  // ── Equity curve ──
  // Sort settled bets by date posted, use cumulative P&L col
  const eqPts = settled
    .map(r=>({d:parseDate(r[C.DATE]),v:r[C.CUM]}))
    .filter(p=>p.d&&p.v!=null)
    .sort((a,b)=>a.d-b.d);

  if (CH['c-eq']) CH['c-eq'].destroy();
  const ctx=document.getElementById('c-eq').getContext('2d');
  const grad=ctx.createLinearGradient(0,0,0,230);
  grad.addColorStop(0,'rgba(0,214,143,0.25)');
  grad.addColorStop(1,'rgba(0,214,143,0)');
  CH['c-eq']=new Chart(ctx,{
    type:'line',
    data:{datasets:[{
      data:eqPts.map(p=>({x:p.d,y:p.v})),
      borderColor:'#00D68F',backgroundColor:grad,
      borderWidth:2,fill:true,tension:0.3,
      pointRadius:0,pointHoverRadius:4,pointHoverBackgroundColor:'#00D68F'
    }]},
    options:{
      responsive:true,maintainAspectRatio:false,
      plugins:{
        legend:{display:false},
        tooltip:{
          callbacks:{
            title:i=>parseDate(i[0].raw.x)?.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})||'',
            label:i=>fmtMoney(i.raw.y)
          }
        }
      },
      scales:{
        x:{
          type:'time',
          time:{tooltipFormat:'MMM d yyyy',
            displayFormats:{day:'MMM d',week:'MMM d',month:'MMM yyyy'}},
          grid:{color:'#1C2535'},
          ticks:{color:'#4A5568',font:{size:10},maxTicksLimit:8}
        },
        y:{
          grid:{color:'#1C2535'},
          ticks:{color:'#4A5568',font:{size:10},callback:v=>fmtMoney(v,false)}
        }
      }
    }
  });

  // ── Pie ──
  if (CH['c-pie']) CH['c-pie'].destroy();
  CH['c-pie']=new Chart(document.getElementById('c-pie').getContext('2d'),{
    type:'doughnut',
    data:{
      labels:[`Won ${won.length}`,`Lost ${lost.length}`,`Push ${push.length}`],
      datasets:[{data:[won.length,lost.length,push.length],
        backgroundColor:['#00D68F','#FF4D4D','#2D3748'],
        borderWidth:0,hoverOffset:8}]
    },
    options:{
      responsive:true,maintainAspectRatio:false,cutout:'62%',
      plugins:{
        legend:{position:'bottom',
          labels:{color:'#8892A4',font:{size:12},padding:16,boxWidth:12}}
      }
    }
  });

  // ── Sport ──
  const sd=groupProfit(settled,C.SPORT,norm);
  mkBar('c-sport',sd.map(d=>d[0]),sd.map(d=>d[1]));

  // ── Bet type ──
  const td=groupProfit(settled,C.TYPE,norm);
  mkBar('c-type',td.map(d=>d[0]),td.map(d=>d[1]));

  // ── Sportsbook ──
  const bd=groupProfit(settled,C.BOOK,normBook);
  mkBar('c-book',bd.map(d=>d[0]),bd.map(d=>d[1]));

  // ── Table ──
  const recent=[...rows]
    .sort((a,b)=>(parseDate(b[C.DATE])||0)-(parseDate(a[C.DATE])||0))
    .slice(0,30);
  document.getElementById('t-count').textContent=
    `Last ${recent.length} of ${rows.length}`;
  document.getElementById('t-body').innerHTML=recent.map(r=>{
    const st=r[C.STATUS]||'pending';
    const pr=r[C.PROFIT];
    const prClass=pr>0?'pos':pr<0?'neg':'';
    const badge=st==='won'?'bw':st==='lost'?'bl':st==='push'?'bp':'bpend';
    return `<tr>
      <td style="color:var(--label);white-space:nowrap">${fmtDate(r[C.DATE])}</td>
      <td style="max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap"
        title="${(r[C.DESC]||'').replace(/"/g,'')}">${r[C.DESC]||'—'}</td>
      <td style="color:var(--label)">${norm(r[C.SPORT])||'—'}</td>
      <td style="color:var(--label)">${normBook(r[C.BOOK])||'—'}</td>
      <td style="color:var(--label)">${fmtOdds(r[C.ODDS])}</td>
      <td style="color:var(--label)">${r[C.STAKE]!=null?'$'+Number(r[C.STAKE]).toFixed(2):'—'}</td>
      <td><span class="badge ${badge}">${st}</span></td>
      <td class="${prClass}" style="font-weight:600;white-space:nowrap">${pr!=null?fmtMoney(pr):'—'}</td>
    </tr>`;
  }).join('');
}

setInterval(loadData,600000);
loadData();
</script>
</body>
</html>
